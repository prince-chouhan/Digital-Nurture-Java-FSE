<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 4.2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">
        Four Equal Columns
    </h2>

    <div class="row">

        <div class="col-sm-3 mb-3">
            <div class="bg-primary text-white p-4 text-center rounded">
                Column 1
            </div>
        </div>

        <div class="col-sm-3 mb-3">
            <div class="bg-success text-white p-4 text-center rounded">
                Column 2
            </div>
        </div>

        <div class="col-sm-3 mb-3">
            <div class="bg-warning text-dark p-4 text-center rounded">
                Column 3
            </div>
        </div>

        <div class="col-sm-3 mb-3">
            <div class="bg-danger text-white p-4 text-center rounded">
                Column 4
            </div>
        </div>

    </div>

</div>

</body>
</html>
