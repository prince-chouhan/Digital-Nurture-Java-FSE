<!DOCTYPE html>
<html lang="en">
<head>

<title>Exercise 2.1</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="mb-4">Bootstrap Directory Structure</h1>

    <div class="card mb-3">
        <div class="card-body">
            <h3>CSS Folder</h3>
            <p>Contains Bootstrap styling files.</p>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <h3>JS Folder</h3>
            <p>Contains JavaScript files for interactive components.</p>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h3>Icons Folder</h3>
            <p>Contains Bootstrap Icons.</p>
        </div>
    </div>

</div>

</body>
