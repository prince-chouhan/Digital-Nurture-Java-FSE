<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9.2</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Button Groups</h2>

    <div class="btn-group mb-4">

        <button class="btn btn-primary">
            Left
        </button>

        <button class="btn btn-primary">
            Middle
        </button>

        <button class="btn btn-primary">
            Right
        </button>

    </div>

    <h2 class="mb-3">
        Toggle Buttons
    </h2>

    <input type="checkbox"
           class="btn-check"
           id="btncheck1">

    <label class="btn btn-outline-success"
           for="btncheck1">

        Option 1

    </label>

    <input type="checkbox"
           class="btn-check"
           id="btncheck2">

    <label class="btn btn-outline-danger"
           for="btncheck2">

        Option 2

    </label>

</div>

</body>
</html>
